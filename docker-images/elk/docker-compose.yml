services:
  food-ordering-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: food-ordering-elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    volumes:
      - food_ordering_es_data:/usr/share/elasticsearch/data
    networks:
      - food-ordering-network

  food-ordering-kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: food-ordering-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://food-ordering-elasticsearch:9200
    depends_on:
      - food-ordering-elasticsearch
    networks:
      - food-ordering-network

  food-ordering-filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.0
    container_name: food-ordering-filebeat
    restart: unless-stopped
    user: root
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - food-ordering-elasticsearch
    networks:
      - food-ordering-network

volumes:
  food_ordering_es_data:
    driver: local

networks:
  food-ordering-network:
    external: true
    name: food-ordering-network
