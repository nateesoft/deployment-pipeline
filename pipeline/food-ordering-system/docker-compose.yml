version: '3.8'

# food-ordering-system — Next.js Frontend
# Port: 3000
# Usage: docker compose up -d
# Build: docker compose build

services:
  food-ordering-system:
    image: food-ordering-system:${IMAGE_TAG:-latest}
    build:
      context: ../../src
      dockerfile: Dockerfile
      args:
        - NODE_ENV=${NODE_ENV:-production}
    container_name: food-ordering-system
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5000}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-changeme}
    networks:
      - jenkins-network
      - food-ordering-network

networks:
  jenkins-network:
    external: true
  food-ordering-network:
    name: food-ordering-network
    driver: bridge
